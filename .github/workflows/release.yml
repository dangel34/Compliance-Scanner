name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt "pyinstaller>=6.0"

      - name: Run tests
        run: pytest

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check for signing certificate
        id: cert
        shell: bash
        env:
          SIGN_CERT_PFX: ${{ secrets.SIGN_CERT_PFX }}
        run: |
          if [ -n "$SIGN_CERT_PFX" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with PyInstaller
        run: python -m PyInstaller compliance_scanner.spec --clean --noconfirm

      - name: Sign exe
        if: steps.cert.outputs.available == 'true'
        shell: pwsh
        env:
          SIGN_CERT_PFX: ${{ secrets.SIGN_CERT_PFX }}
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          $pfxPath = "$env:RUNNER_TEMP\cert.pfx"
          try {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGN_CERT_PFX))
            $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
              Where-Object { $_.FullName -like "*x64*" } | Sort-Object FullName -Descending | Select-Object -First 1).FullName
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfxPath /p $env:SIGN_CERT_PASSWORD "dist\ComplianceScanner\RuleForge.exe"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            if (Test-Path $pfxPath) { Remove-Item $pfxPath -Force }
          }

      - name: Package portable zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "dist\ComplianceScanner\*" -DestinationPath "dist\RuleForge-$ver-portable.zip"

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=${{ steps.version.outputs.version }}" installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Sign installer
        if: steps.cert.outputs.available == 'true'
        shell: pwsh
        env:
          SIGN_CERT_PFX: ${{ secrets.SIGN_CERT_PFX }}
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          $pfxPath = "$env:RUNNER_TEMP\cert.pfx"
          try {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGN_CERT_PFX))
            $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
              Where-Object { $_.FullName -like "*x64*" } | Sort-Object FullName -Descending | Select-Object -First 1).FullName
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfxPath /p $env:SIGN_CERT_PASSWORD "dist\installer\ComplianceScannerSetup.exe"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            if (Test-Path $pfxPath) { Remove-Item $pfxPath -Force }
          }

      - name: Rename installer with version
        shell: bash
        run: |
          mv dist/installer/ComplianceScannerSetup.exe \
             "dist/installer/ComplianceScannerSetup-${{ steps.version.outputs.version }}.exe"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/installer/ComplianceScannerSetup-${{ steps.version.outputs.version }}.exe
            dist/RuleForge-${{ steps.version.outputs.version }}-portable.zip
